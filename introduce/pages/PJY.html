<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자기소개서</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      .resume-card {
        background: white;
        width: 100%;
        max-width: 800px;
        padding: 50px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .section-title {
        border-left: 5px solid #0d6efd;
        padding-left: 15px;
        margin-bottom: 20px;
        font-weight: bold;
        color: #333;
      }

      .info-label {
        font-weight: 600;
        color: #495057;
        width: 100px;
        display: inline-block;
      }
    </style>
  </head>

  <body>
    <div class="resume-card">
      <header class="mb-5 text-center">
        <h1 class="display-4 fw-bold mb-2">박준영</h1>
        <p class="fs-5 text-primary">Backend Developer</p>

        <hr class="my-4" />

        <div class="row text-muted small">
          <div class="col-sm-6 text-sm-start mb-2">📧 email@example.com</div>
          <div class="col-sm-6 text-sm-end mb-2">📍 Seoul, South Korea</div>
        </div>
      </header>

      <section class="mb-5">
        <h2 class="section-title h4">About Me</h2>
        <p class="text-secondary">
          사용자 UX를 중요하게 여기고 새로운 것을 배우는 것을 좋아하는
          개발자입니다!
        </p>
      </section>

      <section class="mb-5">
        <h2 class="section-title h4">Skills</h2>
        <div class="d-flex flex-wrap gap-2">
          <span class="badge bg-primary rounded-pill px-3 py-2">Python</span>
          <span class="badge bg-info text-dark rounded-pill px-3 py-2"
            >MySQL</span
          >
          <span class="badge bg-dark rounded-pill px-3 py-2">Git</span>
        </div>
      </section>

      <section>
        <h2 class="section-title h4">Experience & Awards</h2>
        <ul class="list-group list-group-flush">
          <li class="list-group-item border-0 px-0">
            <span class="info-label">Certificates</span> SQLD, ADsP
          </li>
          <li class="list-group-item border-0 px-0">
            <span class="info-label">Education</span> AI융합학부 졸업
          </li>
          <li class="list-group-item border-0 px-0">
            <span class="info-label">Projects</span> 주식 투자 도우미 AI 개발
          </li>
        </ul>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
